name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Pushes the GitHub Release to this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Commits the generated formula to the dtonair/homebrew-tap repo.
          # Create a fine-grained/classic PAT with `repo` (or contents:write on
          # the tap repo) and add it as a repo secret named TAP_GITHUB_TOKEN.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
